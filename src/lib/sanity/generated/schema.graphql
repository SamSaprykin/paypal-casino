type RootQuery {
  Bonus(
    """Bonus document ID"""
    id: ID!
  ): Bonus
  BonusesListIntl(
    """BonusesListIntl document ID"""
    id: ID!
  ): BonusesListIntl
  Casino(
    """Casino document ID"""
    id: ID!
